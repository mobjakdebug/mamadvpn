plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.mamadvpn.mamadvpn"
    compileSdk = 34  // Explicit target for VpnService API
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.mamadvpn.mamadvpn"
        minSdk = 23  // Android 6.0 (required for VpnService)
        targetSdk = 34
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Add native library ABI filters
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a", "x86_64", "x86"
        }
    }

    // Source the native libraries from jniLibs (built by cargo-ndk)
    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            signingConfig = signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    lint {
        disable 'InvalidPackage'
    }
}

flutter {
    source = "../.."
}

// ── Task: Build native Rust libraries ─────────────────────────────
// Run before the build to ensure native libs are present.
// Requires:
//   - cargo-ndk installed (cargo install cargo-ndk)
//   - Android targets: aarch64-linux-android, armv7-linux-androideabi,
//     x86_64-linux-android, i686-linux-android
//
// Manual build: ./scripts/build-android.sh

def buildNativeLibs = tasks.register("buildNativeLibs") {
    doLast {
        def projectDir = rootProject.projectDir.parentFile.parentFile // up to mamadvpn/
        def script = file("${projectDir}/scripts/build-android.sh")
        if (script.exists()) {
            exec {
                workingDir projectDir
                commandLine "bash", script.absolutePath, "release"
            }
        } else {
            logger.warn("Native build script not found at ${script.absolutePath}. " +
                "Run ./scripts/build-android.sh manually.")
        }
    }
}

// Hook the native build into the build pipeline
tasks.whenTaskAdded { task ->
    if (task.name.contains("compile") && task.name.contains("Sources")) {
        task.dependsOn buildNativeLibs
    }
}

// Also run before merge native libs
tasks.matching { it.name.contains("merge") && it.name.contains("Native") }.configureEach {
    it.dependsOn buildNativeLibs
}
