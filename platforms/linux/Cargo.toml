[package]
name = "mamadvpn-platform-linux"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Linux packet interception backend for MamadVPN - NFQUEUE and raw socket support"

[dependencies]
mamadvpn-core = { path = "../../core" }
mamadvpn-common = { path = "../../common" }

tokio.workspace = true
bytes.workspace = true
anyhow.workspace = true
tracing.workspace = true
async-trait.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
pnet.workspace = true
pcap.workspace = true
libc = "0.2"
nix = "0.29"

# NFQUEUE (libnetfilter_queue binding)
nfqueue = "0.9"

# rand is only used in tests
rand.workspace = true
